<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모이다 관리자</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --primary: #3182F6; --danger: #FF4458; --success: #34C759;
    --text: #E8EAED; --sub: #8B8F9E; --warn: #FFD666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 24px; }
  h1 span { color: var(--primary); }
  .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
  .login-box input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); font-size: 15px; margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
  .login-box button:hover { opacity: .9; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-card .label { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--sub); cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab:hover { border-color: var(--primary); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tr:hover { background: rgba(49,130,246,.06); }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .badge-leader { background: rgba(49,130,246,.15); color: var(--primary); }
  .badge-treasurer { background: rgba(52,199,89,.15); color: var(--success); }
  .badge-member { background: rgba(139,143,158,.15); color: var(--sub); }
  .badge-active { background: rgba(52,199,89,.15); color: var(--success); }
  .badge-inactive { background: rgba(255,68,88,.15); color: var(--danger); }

  .btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .actions { display: flex; gap: 6px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4); }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--card); border-radius: 16px; padding: 28px; max-width: 420px; width: 90%; }
  .modal h3 { margin-bottom: 16px; }
  .modal p { color: var(--sub); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
  .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

  .refresh-btn { background: none; border: 1px solid var(--border); color: var(--sub); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const SUPABASE_URL = 'https://cavwhdccswjfkutvuqtf.supabase.co';
const PROJECT_REF = 'cavwhdccswjfkutvuqtf';
const API_URL = 'https://api.supabase.com/v1/projects/' + PROJECT_REF + '/database/query';

let TOKEN = localStorage.getItem('moida_admin_token') || '';
let currentTab = 'dashboard';

// ── API ──
async function dbQuery(sql) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: sql })
  });
  const data = await res.json();
  if (data.message) throw new Error(data.message);
  return data;
}

// ── Toast ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Confirm Modal ──
function showConfirm(title, body, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>${title}</h3>
    <p>${body}</p>
    <div class="btn-row">
      <button class="btn" style="background:var(--border)" onclick="this.closest('.modal-overlay').remove()">취소</button>
      <button class="btn btn-danger" id="modal-ok">확인</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-ok').onclick = () => { overlay.remove(); onOk(); };
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

// ── Login ──
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-box">
      <h1><span>모이다</span> 관리자</h1>
      <p style="color:var(--sub);margin-bottom:24px">Supabase Management API 토큰을 입력하세요</p>
      <input type="password" id="tokenInput" placeholder="sbp_xxxxxxxxx..." value="${TOKEN}">
      <button onclick="tryLogin()">로그인</button>
    </div>`;
}

async function tryLogin() {
  TOKEN = document.getElementById('tokenInput').value.trim();
  try {
    await dbQuery('SELECT 1;');
    localStorage.setItem('moida_admin_token', TOKEN);
    renderApp();
  } catch (e) {
    toast('토큰이 올바르지 않아요: ' + e.message);
  }
}

// ── Main App ──
async function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="header">
        <h1><span>모이다</span> 관리자</h1>
        <div>
          <button class="refresh-btn" onclick="renderApp()">↻ 새로고침</button>
          <button class="refresh-btn" onclick="logout()" style="margin-left:6px">로그아웃</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab ${currentTab==='dashboard'?'active':''}" onclick="switchTab('dashboard')">대시보드</button>
        <button class="tab ${currentTab==='users'?'active':''}" onclick="switchTab('users')">유저</button>
        <button class="tab ${currentTab==='groups'?'active':''}" onclick="switchTab('groups')">모임</button>
        <button class="tab ${currentTab==='members'?'active':''}" onclick="switchTab('members')">멤버</button>
        <button class="tab ${currentTab==='payments'?'active':''}" onclick="switchTab('payments')">납부</button>
        <button class="tab ${currentTab==='celebrations'?'active':''}" onclick="switchTab('celebrations')">경조사</button>
      </div>
      <div id="content">로딩 중...</div>
    </div>`;
  
  try {
    switch (currentTab) {
      case 'dashboard': await renderDashboard(); break;
      case 'users': await renderUsers(); break;
      case 'groups': await renderGroups(); break;
      case 'members': await renderMembers(); break;
      case 'payments': await renderPayments(); break;
      case 'celebrations': await renderCelebrations(); break;
    }
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}

function switchTab(tab) { currentTab = tab; renderApp(); }
function logout() { localStorage.removeItem('moida_admin_token'); TOKEN = ''; renderLogin(); }

// ── Dashboard ──
async function renderDashboard() {
  const [users, groups, members, payments, celebrations] = await Promise.all([
    dbQuery('SELECT count(*) as cnt FROM auth.users;'),
    dbQuery('SELECT count(*) as cnt FROM groups;'),
    dbQuery('SELECT count(*) as cnt FROM members;'),
    dbQuery('SELECT count(*) as cnt FROM payments;'),
    dbQuery("SELECT count(*) as cnt FROM celebrations;").catch(() => [{ cnt: 0 }]),
  ]);

  const paidQ = await dbQuery("SELECT count(*) as cnt FROM payments WHERE status = 'paid';").catch(() => [{ cnt: 0 }]);
  const unpaidQ = await dbQuery("SELECT count(*) as cnt FROM payments WHERE status = 'unpaid';").catch(() => [{ cnt: 0 }]);

  // Recent members
  const recent = await dbQuery("SELECT m.name, m.role, m.joined_at, g.name as group_name FROM members m JOIN groups g ON g.id = m.group_id ORDER BY m.joined_at DESC LIMIT 5;");

  document.getElementById('content').innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="label">총 유저</div><div class="value">${users[0].cnt}</div></div>
      <div class="stat-card"><div class="label">총 모임</div><div class="value">${groups[0].cnt}</div></div>
      <div class="stat-card"><div class="label">총 멤버십</div><div class="value">${members[0].cnt}</div></div>
      <div class="stat-card"><div class="label">납부 기록</div><div class="value">${payments[0].cnt}</div></div>
      <div class="stat-card"><div class="label">납부 완료</div><div class="value" style="color:var(--success)">${paidQ[0].cnt}</div></div>
      <div class="stat-card"><div class="label">미납</div><div class="value" style="color:var(--danger)">${unpaidQ[0].cnt}</div></div>
      <div class="stat-card"><div class="label">경조사</div><div class="value">${celebrations[0].cnt}</div></div>
    </div>
    <h3 style="margin-bottom:12px">최근 가입 멤버</h3>
    <div class="table-wrap"><table>
      <tr><th>이름</th><th>역할</th><th>모임</th><th>가입일</th></tr>
      ${recent.map(r => `<tr>
        <td>${r.name}</td>
        <td><span class="badge badge-${r.role}">${r.role}</span></td>
        <td>${r.group_name}</td>
        <td>${new Date(r.joined_at).toLocaleDateString('ko')}</td>
      </tr>`).join('')}
    </table></div>`;
}

// ── Users ──
async function renderUsers() {
  const users = await dbQuery("SELECT id, email, created_at, last_sign_in_at FROM auth.users ORDER BY created_at DESC;");
  // Get profiles
  const profiles = await dbQuery("SELECT id, nickname, full_name, gender, birth_date FROM profiles;").catch(() => []);
  const profileMap = {};
  profiles.forEach(p => profileMap[p.id] = p);

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <tr><th>닉네임</th><th>이름</th><th>이메일</th><th>가입일</th><th>최근 로그인</th><th>액션</th></tr>
      ${users.map(u => {
        const p = profileMap[u.id] || {};
        return `<tr>
          <td>${p.nickname || '-'}</td>
          <td>${p.full_name || '-'}</td>
          <td style="font-size:12px;color:var(--sub)">${u.email || '-'}</td>
          <td>${new Date(u.created_at).toLocaleDateString('ko')}</td>
          <td>${u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleDateString('ko') : '-'}</td>
          <td><div class="actions">
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${p.nickname||u.email||u.id}')">삭제</button>
          </div></td>
        </tr>`;
      }).join('')}
    </table></div>`;
}

async function deleteUser(id, name) {
  showConfirm('유저 삭제', `<b>${name}</b>을 정말 삭제하시겠어요?<br>관련된 모든 데이터가 삭제됩니다.`, async () => {
    try {
      await dbQuery(`DELETE FROM members WHERE user_id = '${id}';`);
      await dbQuery(`DELETE FROM auth.users WHERE id = '${id}';`);
      toast('유저 삭제 완료');
      renderApp();
    } catch(e) { toast('삭제 실패: ' + e.message); }
  });
}

// ── Groups ──
async function renderGroups() {
  const groups = await dbQuery(`
    SELECT g.*, 
      (SELECT count(*) FROM members m WHERE m.group_id = g.id AND m.status = 'active') as member_count
    FROM groups g ORDER BY g.created_at DESC;
  `);

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <tr><th>이름</th><th>초대코드</th><th>회비</th><th>멤버수</th><th>생성일</th><th>액션</th></tr>
      ${groups.map(g => `<tr>
        <td><strong>${g.name}</strong></td>
        <td><code style="background:var(--border);padding:2px 8px;border-radius:6px">${g.invite_code}</code></td>
        <td>${Number(g.fee_amount).toLocaleString()}원</td>
        <td>${g.member_count}명</td>
        <td>${new Date(g.created_at).toLocaleDateString('ko')}</td>
        <td><div class="actions">
          <button class="btn btn-primary btn-sm" onclick="switchTab('members');renderApp()">멤버</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGroup('${g.id}','${g.name}')">삭제</button>
        </div></td>
      </tr>`).join('')}
    </table></div>`;
}

async function deleteGroup(id, name) {
  showConfirm('모임 삭제', `<b>${name}</b> 모임을 삭제하시겠어요?<br>모든 멤버, 납부, 장부 기록이 함께 삭제됩니다.`, async () => {
    try {
      await dbQuery(`DELETE FROM groups WHERE id = '${id}';`);
      toast('모임 삭제 완료');
      renderApp();
    } catch(e) { toast('삭제 실패: ' + e.message); }
  });
}

// ── Members ──
async function renderMembers() {
  const members = await dbQuery(`
    SELECT m.*, g.name as group_name,
      p.nickname, p.full_name
    FROM members m
    JOIN groups g ON g.id = m.group_id
    LEFT JOIN profiles p ON p.id = m.user_id
    ORDER BY g.name, m.role, m.name;
  `);

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <tr><th>이름</th><th>닉네임</th><th>모임</th><th>역할</th><th>상태</th><th>가입일</th><th>액션</th></tr>
      ${members.map(m => `<tr>
        <td>${m.name}</td>
        <td>${m.nickname || '-'}</td>
        <td>${m.group_name}</td>
        <td><span class="badge badge-${m.role}">${m.role}</span></td>
        <td><span class="badge badge-${m.status}">${m.status}</span></td>
        <td>${new Date(m.joined_at).toLocaleDateString('ko')}</td>
        <td><div class="actions">
          <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}','${m.name}')">탈퇴</button>
        </div></td>
      </tr>`).join('')}
    </table></div>`;
}

async function deleteMember(id, name) {
  showConfirm('멤버 탈퇴', `<b>${name}</b>을 모임에서 내보내시겠어요?`, async () => {
    try {
      await dbQuery(`DELETE FROM members WHERE id = '${id}';`);
      toast('멤버 탈퇴 처리 완료');
      renderApp();
    } catch(e) { toast('실패: ' + e.message); }
  });
}

// ── Payments ──
async function renderPayments() {
  const payments = await dbQuery(`
    SELECT p.*, m.name as member_name, g.name as group_name
    FROM payments p
    JOIN members m ON m.id = p.member_id
    JOIN groups g ON g.id = p.group_id
    ORDER BY p.month DESC, m.name;
  `).catch(() => []);

  if (!payments.length) {
    document.getElementById('content').innerHTML = '<div class="empty">납부 기록이 없어요</div>';
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <tr><th>회원</th><th>모임</th><th>월</th><th>금액</th><th>상태</th><th>액션</th></tr>
      ${payments.map(p => `<tr>
        <td>${p.member_name}</td>
        <td>${p.group_name}</td>
        <td>${p.month}</td>
        <td>${Number(p.amount).toLocaleString()}원</td>
        <td><span class="badge badge-${p.status === 'paid' ? 'active' : p.status === 'pending' ? 'leader' : 'inactive'}">${p.status}</span></td>
        <td><div class="actions">
          <button class="btn btn-primary btn-sm" onclick="updatePaymentStatus('${p.id}','paid')">납부</button>
          <button class="btn btn-sm" style="background:var(--warn);color:#333" onclick="updatePaymentStatus('${p.id}','unpaid')">미납</button>
        </div></td>
      </tr>`).join('')}
    </table></div>`;
}

async function updatePaymentStatus(id, status) {
  try {
    await dbQuery(`UPDATE payments SET status = '${status}' WHERE id = '${id}';`);
    toast('상태 변경 완료');
    renderApp();
  } catch(e) { toast('실패: ' + e.message); }
}

// ── Celebrations ──
async function renderCelebrations() {
  const celebrations = await dbQuery(`
    SELECT c.*, g.name as group_name, m.name as member_name
    FROM celebrations c
    JOIN groups g ON g.id = c.group_id
    LEFT JOIN members m ON m.id = c.member_id
    ORDER BY c.date DESC;
  `).catch(() => []);

  if (!celebrations.length) {
    document.getElementById('content').innerHTML = '<div class="empty">경조사가 없어요</div>';
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="table-wrap"><table>
      <tr><th>유형</th><th>회원</th><th>모임</th><th>날짜</th><th>메모</th><th>액션</th></tr>
      ${celebrations.map(c => `<tr>
        <td>${c.type || '-'}</td>
        <td>${c.member_name || '-'}</td>
        <td>${c.group_name}</td>
        <td>${c.date ? new Date(c.date).toLocaleDateString('ko') : '-'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${c.memo || '-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteCelebration('${c.id}')">삭제</button></td>
      </tr>`).join('')}
    </table></div>`;
}

async function deleteCelebration(id) {
  showConfirm('경조사 삭제', '이 경조사를 삭제하시겠어요?', async () => {
    try {
      await dbQuery(`DELETE FROM celebrations WHERE id = '${id}';`);
      toast('삭제 완료');
      renderApp();
    } catch(e) { toast('실패: ' + e.message); }
  });
}

// ── Init ──
if (TOKEN) { renderApp(); } else { renderLogin(); }
</script>
</body>
</html>
