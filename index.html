<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모이다 관리자</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --primary: #3182F6; --danger: #FF4458; --success: #34C759;
    --text: #E8EAED; --sub: #8B8F9E; --warn: #FFD666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 24px; }
  h1 span { color: var(--primary); }
  .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
  .login-box input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); font-size: 15px; margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
  .login-box button:hover { opacity: .9; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-card .label { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .stat-card .trend { font-size: 12px; margin-top: 4px; }
  .trend-up { color: var(--success); }
  .trend-down { color: var(--danger); }
  .section-title { font-size: 16px; font-weight: 700; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .emoji { font-size: 18px; }
  .pill-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .pill { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; margin-bottom: 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 2px; transition: height .3s; }
  .bar-label { font-size: 10px; color: var(--sub); margin-top: 4px; }
  .bar-value { font-size: 10px; color: var(--text); margin-bottom: 2px; }
  .retention-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .retention-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; flex: 1; min-width: 100px; }
  .retention-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 18px; font-weight: 800; }
  .retention-label { font-size: 12px; color: var(--sub); }
  .dist-bar { display: flex; height: 24px; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
  .dist-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; min-width: 20px; }
  .dist-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--sub); }
  .dist-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .engage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .engage-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .engage-card .num { font-size: 22px; font-weight: 800; }
  .engage-card .lbl { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .alert-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .alert-icon { font-size: 24px; }
  .alert-num { font-size: 20px; font-weight: 800; }
  .alert-label { font-size: 12px; color: var(--sub); }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--sub); cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab:hover { border-color: var(--primary); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tr:hover { background: rgba(49,130,246,.06); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .badge-leader { background: rgba(49,130,246,.15); color: var(--primary); }
  .badge-treasurer { background: rgba(52,199,89,.15); color: var(--success); }
  .badge-member { background: rgba(139,143,158,.15); color: var(--sub); }
  .badge-active { background: rgba(52,199,89,.15); color: var(--success); }
  .badge-inactive { background: rgba(255,68,88,.15); color: var(--danger); }
  .btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .actions { display: flex; gap: 6px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--card); border-radius: 16px; padding: 28px; max-width: 420px; width: 90%; }
  .modal h3 { margin-bottom: 16px; }
  .modal p { color: var(--sub); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
  .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .refresh-btn { background: none; border: 1px solid var(--border); color: var(--sub); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text); font-size: 14px; }
  .search-bar input::placeholder { color: var(--sub); }
  .user-detail { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .user-detail h3 { margin-bottom: 12px; }
  .user-detail .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .user-detail .info-item { font-size: 13px; }
  .user-detail .info-item .label { color: var(--sub); font-size: 11px; margin-bottom: 2px; }
  .textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
  .announce-form { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
  .announce-form h3 { margin-bottom: 16px; }
  .announce-form input, .announce-form textarea { width: 100%; margin-bottom: 12px; }
  .announce-form input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; }
  .announce-form textarea { padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; min-height: 100px; }
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
</style>
</head>

// ── REST API ──
async function restGet(table, query) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + query, {
    headers: { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY }
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return await res.json();
}

async function restDelete(table, match) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + match, {
    method: 'DELETE',
    headers: { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY }
  });
  if (!res.ok) throw new Error('삭제 실패: ' + res.status);
}

async function restPatch(table, match, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + match, {
    method: 'PATCH',
    headers: {
      'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('수정 실패: ' + res.status);
}

async function restRpc(fn, params) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: {
      'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(params || {})
  });
  if (!res.ok) throw new Error('RPC error: ' + res.status);
  return await res.json();
}

// ── Toast ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Confirm Modal ──
function showConfirm(title, body, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>${title}</h3>
    <p>${body}</p>
    <div class="btn-row">
      <button class="btn" style="background:var(--border)" onclick="this.closest('.modal-overlay').remove()">취소</button>
      <button class="btn btn-danger" id="modal-ok">확인</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-ok').onclick = () => { overlay.remove(); onOk(); };
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

// ── Main App ──

function switchTab(tab) { currentTab = tab; renderApp(); }
function logout() { localStorage.removeItem('moida_admin_v2'); SERVICE_KEY = ''; renderLogin(); }

// ── 공통 유틸 ──
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + '분 전';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + '시간 전';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + '일 전';
  return new Date(dateStr).toLocaleDateString('ko');
}

// ── Analytics ──
let analyticsDays = 30;
async function renderAnalytics() {
  const d = await restRpc('get_analytics_dashboard', { days_back: analyticsDays });

  const eventNameKo = {
    'login': '로그인', 'sign_up': '회원가입', 'onboarding_complete': '온보딩 완료',
    'profile_edited': '프로필 수정', 'logout': '로그아웃',
    'group_created': '모임 생성', 'group_joined': '모임 가입',
    'post_created': '글 작성', 'poll_created': '투표 생성', 'poll_voted': '투표 참여',
    'message_sent': '채팅', 'direct_message_sent': 'DM',
    'event_created': '일정 생성', 'celebration_created': '경조사 등록',
    'notice_created': '공지 작성', 'invoice_created': '청구서 생성',
    'ledger_entry_created': '장부 기록', 'payment_recorded': '납부 승인',
    'share_invite': '초대 공유', 'feature_used': '기능 사용'
  };

  // DAU 차트
  const dau = (d.daily_active_users || []).reverse();
  const maxUsers = Math.max(...dau.map(x => x.users), 1);
  const dauBars = dau.map(x => {
    const h = Math.max(Math.round((x.users / maxUsers) * 100), 2);
    const day = new Date(x.date).toLocaleDateString('ko', {month:'numeric',day:'numeric'});
    return `<div class="bar-col"><div class="bar-value">${x.users}</div><div class="bar" style="height:${h}%;background:var(--primary)"></div><div class="bar-label">${day}</div></div>`;
  }).join('');

  // 이벤트 랭킹
  const events = d.events_by_name || [];
  const maxEvt = Math.max(...events.map(x => x.count), 1);
  const eventRows = events.map(e => {
    const pct = Math.round((e.count / maxEvt) * 100);
    const name = eventNameKo[e.event_name] || e.event_name;
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:120px;font-size:13px;font-weight:600;flex-shrink:0">${name}</div>
      <div style="flex:1;background:var(--border);border-radius:4px;height:20px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--primary);border-radius:4px;display:flex;align-items:center;padding-left:6px">
          <span style="font-size:11px;font-weight:700;color:#fff">${e.count}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // 로그인 방법 분포
  const loginMethods = d.login_methods || [];
  const loginColors = { 'kakao': '#FEE500', 'apple': '#999', 'phone': 'var(--success)' };
  const loginTotal = loginMethods.reduce((s, m) => s + m.count, 0) || 1;
  const loginBar = loginMethods.map(m => {
    const pct = Math.round((m.count / loginTotal) * 100);
    const bg = loginColors[m.method] || 'var(--primary)';
    const txtColor = m.method === 'kakao' ? '#000' : '#fff';
    return `<div class="dist-seg" style="width:${Math.max(pct,5)}%;background:${bg};color:${txtColor}">${pct}%</div>`;
  }).join('');
  const loginLegend = loginMethods.map(m => {
    const bg = loginColors[m.method] || 'var(--primary)';
    const label = m.method === 'kakao' ? '카카오' : m.method === 'apple' ? 'Apple' : '전화번호';
    return `<span><span class="dist-dot" style="background:${bg}"></span>${label} (${m.count})</span>`;
  }).join('');

  // 최근 이벤트
  const recent = (d.recent_events || []).slice(0, 30);
  const recentRows = recent.map(e => {
    const name = eventNameKo[e.event_name] || e.event_name;
    const user = e.user_nickname || '-';
    const time = timeAgo(e.created_at);
    const paramStr = e.params && Object.keys(e.params).length
      ? Object.entries(e.params).map(([k,v]) => `${k}: ${v}`).join(', ')
      : '';
    return `<tr>
      <td style="font-weight:600">${name}</td>
      <td>${user}</td>
      <td style="font-size:12px;color:var(--sub)">${paramStr}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--sub)">${time}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="tab ${analyticsDays===7?'active':''}" onclick="analyticsDays=7;renderAnalytics()">7일</button>
      <button class="tab ${analyticsDays===30?'active':''}" onclick="analyticsDays=30;renderAnalytics()">30일</button>
      <button class="tab ${analyticsDays===90?'active':''}" onclick="analyticsDays=90;renderAnalytics()">90일</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">오늘 활성 유저</div>
        <div class="value">${d.today_users || 0}</div>
        <div class="trend" style="color:var(--sub)">이벤트 ${d.today_events || 0}건</div>
      </div>
      <div class="stat-card">
        <div class="label">${analyticsDays}일 활성 유저</div>
        <div class="value">${d.unique_users || 0}</div>
      </div>
      <div class="stat-card">
        <div class="label">${analyticsDays}일 총 이벤트</div>
        <div class="value">${(d.total_events || 0).toLocaleString()}</div>
      </div>
    </div>

    <div class="section-title"><span class="emoji">📈</span> 일별 활성 유저 (DAU)</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
      ${dau.length ? `<div class="bar-chart">${dauBars}</div>` : '<div class="empty">데이터 없음</div>'}
    </div>

    <div class="section-title"><span class="emoji">🏆</span> 기능별 사용량</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
      ${events.length ? eventRows : '<div class="empty">데이터 없음</div>'}
    </div>

    <div class="section-title"><span class="emoji">🔐</span> 로그인 방법</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
      ${loginMethods.length ? `<div class="dist-bar">${loginBar}</div><div class="dist-legend">${loginLegend}</div>` : '<div class="empty">데이터 없음</div>'}
    </div>

    <div class="section-title"><span class="emoji">🕐</span> 최근 활동</div>
    ${recent.length ? `<div class="table-wrap"><table>

async function renderDashboard() {
  const d = await restRpc('get_admin_dashboard');

  // Helpers
  function trend(curr, prev, label) {
    if (!prev) return '';
    const diff = curr - prev;
    if (diff === 0) return `<div class="trend" style="color:var(--sub)">전주 동일</div>`;
    const cls = diff > 0 ? 'trend-up' : 'trend-down';
    const arrow = diff > 0 ? '↑' : '↓';
    return `<div class="trend ${cls}">${arrow} ${Math.abs(diff)} ${label}</div>`;
  }

  function barChart(data, color) {
    if (!data || !data.length) return '<div style="color:var(--sub);font-size:13px">데이터 없음</div>';
    const max = Math.max(...data.map(d => d.count), 1);
    return `<div class="bar-chart">${data.map(d => {
      const h = Math.max((d.count / max) * 100, 2);
      const dt = new Date(d.date);
      const label = (dt.getMonth()+1) + '/' + dt.getDate();
      return `<div class="bar-col"><div class="bar-value">${d.count}</div><div class="bar" style="height:${h}%;background:${color}"></div><div class="bar-label">${label}</div></div>`;
    }).join('')}</div>`;
  }

  function retentionColor(v) {
    if (v >= 30) return 'var(--success)';
    if (v >= 15) return 'var(--warn)';
    return 'var(--danger)';

  const inactivePercent = d.total_users > 0 ? Math.round(d.inactive_7d / d.total_users * 100) : 0;

        ${trend(d.groups_this_week, d.groups_prev_week, 'vs 전주')}

// ── Users (profiles) ──
let userSearch = '';
async function renderUsers() {
  const profiles = await restGet('profiles', 'select=id,nickname,full_name,gender,birth_date,created_at&order=created_at.desc');
  const members = await restGet('members', 'select=user_id,group:groups(name),role,status').catch(() => []);
  
  // Build user-group map
  const userGroups = {};
  members.forEach(m => {
    if (!userGroups[m.user_id]) userGroups[m.user_id] = [];
    userGroups[m.user_id].push({ name: m.group?.name || '-', role: m.role, status: m.status });
  });

  let filtered = profiles;
  if (userSearch) {
    const q = userSearch.toLowerCase();
    filtered = profiles.filter(p => 
      (p.nickname || '').toLowerCase().includes(q) || 
      (p.full_name || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <input type="text" id="userSearchInput" placeholder="닉네임 또는 이름으로 검색..." value="${userSearch}" oninput="userSearch=this.value">
      <button class="btn btn-primary" onclick="renderUsers()">검색</button>
      ${userSearch ? '<button class="btn" style="background:var(--border)" onclick="userSearch=\'\';renderUsers()">초기화</button>' : ''}
    </div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:12px">총 ${profiles.length}명${filtered.length !== profiles.length ? ' · 검색결과 ' + filtered.length + '명' : ''}</div>
    <div class="table-wrap"><table>
      <tr><th>닉네임</th><th>이름</th><th>성별</th><th>모임</th><th>가입일</th><th>액션</th></tr>
      ${filtered.map(p => {
        const groups = userGroups[p.id] || [];
        const groupStr = groups.length ? groups.map(g => `<span class="badge badge-${g.role}" style="margin:1px">${g.name} (${g.role})</span>`).join(' ') : '<span style="color:var(--sub)">없음</span>';
        return `<tr>
        <td><strong>${p.nickname || '-'}</strong></td>
        <td>${p.full_name || '-'}</td>
        <td>${p.gender === 'male' ? '남' : p.gender === 'female' ? '여' : '-'}</td>
        <td>${groupStr}</td>
        <td style="white-space:nowrap">${new Date(p.created_at).toLocaleDateString('ko')}</td>
        <td><div class="actions">
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${p.id}','${(p.nickname||p.full_name||p.id).replace(/'/g,"\\'")}')">삭제</button>
        </div></td>
      </tr>`;
      }).join('')}
    </table></div>`;
  
  const input = document.getElementById('userSearchInput');
  if (input) input.addEventListener('keydown', e => { if(e.key==='Enter') renderUsers(); });
}

    try {
      // Save to admin_announcements
      const res = await fetch(SUPABASE_URL + '/rest/v1/admin_announcements', {
        method: 'POST',
        headers: {
          'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY,
          'Content-Type': 'application/json', 'Prefer': 'return=representation'
        },
        body: JSON.stringify({ title, body, target })
      });
      if (!res.ok) throw new Error('저장 실패: ' + res.status);

      // Get target users (push tokens)
      let userQuery = 'select=user_id,role';
      if (target === 'leaders') userQuery += '&role=eq.leader';
      else if (target === 'treasurers') userQuery += '&role=eq.treasurer';
      const targetMembers = await restGet('members', userQuery).catch(() => []);
      const userIds = [...new Set(targetMembers.map(m => m.user_id))];

      // Insert notifications for each user
      if (userIds.length > 0) {
        const notifications = userIds.map(uid => ({
          user_id: uid,
          type: 'admin_announcement',
          title: title,
          body: body
        }));
        
        await fetch(SUPABASE_URL + '/rest/v1/notifications', {
          method: 'POST',
          headers: {
            'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json', 'Prefer': 'return=minimal'
          },
          body: JSON.stringify(notifications)
        }).catch(() => {});
      }

      toast(`공지 발송 완료 (${userIds.length}명)`);
      renderAnnounce();
    } catch(e) { toast('발송 실패: ' + e.message); }
  });
}

async function deleteAnnouncement(id) {
  showConfirm('공지 삭제', '이 공지를 삭제하시겠어요?', async () => {
    try {
      await restDelete('admin_announcements', 'id=eq.' + id);
      toast('삭제 완료');
      renderAnnounce();
    } catch(e) { toast('실패: ' + e.message); }
  });
}

// ── Feedback ──
let feedbackFilter = 'all';

async function renderFeedback() {
  let query = 'select=*,profile:profiles!feedback_user_id_profiles_fkey(nickname,full_name)&order=created_at.desc';
  if (feedbackFilter !== 'all') {
    query += '&category=eq.' + encodeURIComponent(feedbackFilter);
  }
  const feedbacks = await restGet('feedback', query).catch(() => []);

  const counts = { all: feedbacks.length };
  feedbacks.forEach(f => { counts[f.category] = (counts[f.category] || 0) + 1; });

  // If filter was applied, re-count with all items
  let allFeedbacks = feedbacks;
  if (feedbackFilter !== 'all') {
    const allQuery = 'select=id,category&order=created_at.desc';
    const allItems = await restGet('feedback', allQuery).catch(() => []);
    counts.all = allItems.length;
    allItems.forEach(f => { counts[f.category] = (counts[f.category] || 0) + 1; });
  }

  function catBadge(cat) {
    switch(cat) {
      case '버그': return '<span class="badge" style="background:rgba(255,68,88,.15);color:var(--danger)">🐛 버그</span>';
      case '기능 제안': return '<span class="badge" style="background:rgba(49,130,246,.15);color:var(--primary)">💡 기능 제안</span>';
      default: return '<span class="badge" style="background:rgba(139,143,158,.15);color:var(--sub)">💬 기타</span>';
    }
  }

  function statusBadge(status) {
    switch(status) {
      case 'resolved': return '<span class="badge badge-active">✅ 해결</span>';
      case 'in_progress': return '<span class="badge badge-leader">🔧 처리중</span>';
      default: return '<span class="badge" style="background:rgba(255,214,102,.15);color:var(--warn)">⏳ 대기</span>';
    }
  }

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="tab ${feedbackFilter==='all'?'active':''}" onclick="feedbackFilter='all';renderFeedback()">전체 (${counts.all || 0})</button>
        <button class="tab ${feedbackFilter==='버그'?'active':''}" onclick="feedbackFilter='버그';renderFeedback()">🐛 버그 (${counts['버그'] || 0})</button>
        <button class="tab ${feedbackFilter==='기능 제안'?'active':''}" onclick="feedbackFilter='기능 제안';renderFeedback()">💡 기능 제안 (${counts['기능 제안'] || 0})</button>
        <button class="tab ${feedbackFilter==='기타'?'active':''}" onclick="feedbackFilter='기타';renderFeedback()">💬 기타 (${counts['기타'] || 0})</button>
      </div>
    </div>
    ${!feedbacks.length ? '<div class="empty">문의가 없어요 🎉</div>' : `
    <div class="table-wrap"><table>
      <tr><th>상태</th><th>카테고리</th><th>내용</th><th>작성자</th><th>시간</th><th>액션</th></tr>
      ${feedbacks.map(f => `<tr>
        <td>${statusBadge(f.status)}</td>
        <td>${catBadge(f.category)}</td>
        <td style="max-width:400px;white-space:pre-wrap;word-break:break-word;font-size:13px">${(f.content || '').replace(/</g,'&lt;')}</td>
        <td style="white-space:nowrap">${f.profile?.nickname || f.profile?.full_name || f.user_id?.slice(0,8) || '-'}</td>
        <td style="white-space:nowrap;font-size:12px;color:var(--sub)">${timeAgo(f.created_at)}</td>
        <td>
          <div class="actions" style="flex-direction:column;gap:4px">
            ${f.status !== 'in_progress' ? `<button class="btn btn-primary btn-sm" onclick="updateFeedbackStatus('${f.id}','in_progress')">처리중</button>` : ''}
            ${f.status !== 'resolved' ? `<button class="btn btn-sm" style="background:var(--success);color:#fff" onclick="updateFeedbackStatus('${f.id}','resolved')">해결</button>` : ''}
            ${f.status === 'resolved' ? `<button class="btn btn-sm" style="background:var(--border)" onclick="updateFeedbackStatus('${f.id}','pending')">재오픈</button>` : ''}
            <button class="btn btn-danger btn-sm" onclick="deleteFeedback('${f.id}')">삭제</button>
          </div>
        </td>
      </tr>`).join('')}
    </table></div>`}
  `;
}

async function updateFeedbackStatus(id, status) {
  try {
    await restPatch('feedback', 'id=eq.' + id, { status });
    toast('상태 변경 완료');
    renderFeedback();
  } catch(e) { toast('실패: ' + e.message); }
}

async function deleteFeedback(id) {
  showConfirm('문의 삭제', '이 문의를 삭제하시겠어요?', async () => {
    try {
      await restDelete('feedback', 'id=eq.' + id);
      toast('삭제 완료');
      renderFeedback();
    } catch(e) { toast('실패: ' + e.message); }
  });
}

// ── Init ──
if (SERVICE_KEY) { renderApp(); } else { renderLogin(); }
</script>
